
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; font-family: sans-serif; }
        .calc { background: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #display { width: 100%; height: 50px; margin-bottom: 20px; text-align: right; font-size: 24px; padding: 10px; border: none; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 60px); gap: 10px; }
        button { 
            height: 60px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            transition: transform 0.1s ease, filter 0.2s;
        }
        /* Efeito de clique */
        button:active { transform: scale(0.9); }
        
        /* Cores variadas */
        .num { background: #555; color: white; }
        .op { background: #f39c12; color: white; }
        .equal { background: #27ae60; color: white; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calc">
    <input type="text" id="display" disabled>
    <div class="grid">
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('*')">×</button>
        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('-')">-</button>
        <button class="num" onclick="append('0')">0</button>
        <button class="op" onclick="clearDisplay()">C</button>
        <button class="equal" onclick="calculate()">=</button>
        <button class="op" onclick="append('+')">+</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    function append(val) { display.value += val; }
    function clearDisplay() { display.value = ''; }
    function calculate() { try { display.value = eval(display.value); } catch { display.value = 'Erro'; } }
</script>

</body>
</html>
